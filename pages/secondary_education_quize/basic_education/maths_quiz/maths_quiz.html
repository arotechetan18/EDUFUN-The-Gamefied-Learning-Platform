<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Maths Quiz</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Custom Tailwind Configuration for colors and animation
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#1D4ED8', // Deep Blue for a logical/math theme
                        'light-blue': '#EFF6FF',   // Very Light Blue background
                        'accent-red': '#EF4444',
                        'accent-green': '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    keyframes: {
                        // 3D Flip Animation Keyframes
                        flip: {
                            '0%, 100%': { transform: 'rotateY(0deg)', opacity: '1' },
                            '50%': { transform: 'rotateY(10deg)', opacity: '0.5' },
                        }
                    },
                    animation: {
                        flip: 'flip 0.7s ease-in-out',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom CSS only for the timer progress transition and background */
        body {
            /* Light Blue Background */
            background-color: #EFF6FF; 
        }

        /* Class to apply the flip animation */
        .card-animate {
            animation: flip 0.7s ease-in-out;
        }

        /* Timer Progress Bar transition */
        .timer-progress {
            transition: width 1s linear;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex justify-center items-center p-4">
    <div id="quiz-card" class="quiz-container w-full max-w-xl bg-white p-6 sm:p-8 rounded-2xl shadow-2xl border-4 border-primary-blue transition-all">
        
        <div class="quiz-heading flex items-center justify-center mb-6 border-b pb-4 border-primary-blue/30">
            <div class="heading-icon w-14 h-14 mr-4 flex-shrink-0">
               <!-- Placeholder Icon for Maths -->
               <img src="https://placehold.co/60x60/1D4ED8/FFFFFF?text=Math" alt="Quiz Icon" class="rounded-full shadow-md" onerror="this.onerror=null; this.src='https://placehold.co/60x60/1D4ED8/FFFFFF?text=Math'"> 
            </div>
            <span class="quiz-text text-3xl font-extrabold text-primary-blue">Maths Quiz</span>
        </div>

        <!-- Timer Progress Bar -->
        <div class="timer-bar mb-4 bg-gray-200 rounded-full h-3">
            <div id="timer-progress" class="timer-progress h-3 rounded-full bg-accent-red" style="width: 100%;"></div>
        </div>
        <div class="timer text-xl font-bold mb-6 text-accent-red">Time Left: <span id="timer-text">30</span>s</div>


        <div class="quiz-content">
            <h2 id="question" class="text-xl sm:text-2xl font-semibold text-gray-800 mb-6 text-left"></h2>
            
            <div class="options space-y-3" id="options">
                <!-- Options will be loaded here -->
            </div>
            
            <div class="mt-8 flex justify-center space-x-4 border-t pt-4 border-gray-200">
                <button class="next-btn hidden px-6 py-3 bg-primary-blue text-white font-bold rounded-full shadow-lg transition duration-200 hover:bg-primary-blue/90 active:scale-95 focus:outline-none focus:ring-4 focus:ring-primary-blue/50" onclick="applyFlipAnimation(nextQuestion)">Next</button>
                <button class="submit-btn hidden px-6 py-3 bg-primary-blue text-white font-bold rounded-full shadow-lg transition duration-200 hover:bg-primary-blue/90 active:scale-95 focus:outline-none focus:ring-4 focus:ring-primary-blue/50" onclick="submitQuiz()">Submit</button>
            </div>
        </div>
    </div>
    
<script>
const quizData = [
    {
        question : "What is the square root of 144?",
        options: ["10", "12", "14", "16"],
        answer: 1
    },
    {
        question: "If a triangle has angles of 50° and 60°, what is the measure of the third angle?",
        options: ["70°", "80°", "90°", "100°"],
        answer: 0
    },
    {
        question: "What is 3/4 of 48?",
        options: ["24", "30", "36", "40"],
        answer: 2
    },
    {
        question: "A train travels 60 km in 1 hour. How far will it travel in 4.5 hours at the same speed?",
        options: ["240km", "270km", "280km", "300km"],
        answer: 1
    },
    {
        question: "What is the value of 12 * 8",
        options: ["92", "96", "88", "104"],
        answer: 1
    }
];

let currentQuestionIndex = 0;
let score = 0;
let timer;
const totalTime = 30; // 30 seconds per question
let timeLeft = totalTime;
const quizCard = document.getElementById('quiz-card');

function startTimer() {
    clearInterval(timer); 
    timeLeft = totalTime;
    const timerText = document.getElementById("timer-text");
    const progressBar = document.getElementById("timer-progress");
    
    // Reset progress bar
    progressBar.style.width = '100%';
    progressBar.classList.add('bg-accent-red');
    progressBar.classList.remove('bg-red-700');
    timerText.textContent = timeLeft;

    timer = setInterval(() => {
        timeLeft--;
        timerText.textContent = timeLeft;
        
        // Update Progress Bar
        const percentage = (timeLeft / totalTime) * 100;
        progressBar.style.width = `${percentage}%`;
        
        // Change color when time is low
        if (timeLeft < 10) {
             progressBar.classList.remove('bg-accent-red');
             progressBar.classList.add('bg-red-700');
        }

        if (timeLeft <= 0) {
            clearInterval(timer);
            const options = document.querySelectorAll(".option");
            if (options.length > 0 && !options[0].disabled) {
                // If the user hasn't selected anything, lock options
                options.forEach(btn => btn.disabled = true);
                if (currentQuestionIndex < quizData.length - 1) {
                    document.querySelector(".next-btn").style.display = "inline-block";
                } else {
                    document.querySelector(".submit-btn").style.display = "inline-block";
                }
            }
            // Trigger animation and move to next question/submit
            applyFlipAnimation(nextQuestion);
        }
    }, 1000);
}

function loadQuestion() {
    // Remove animation class after transition
    quizCard.classList.remove('card-animate');

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.querySelector(".next-btn");
    const submitBtn = document.querySelector(".submit-btn");

    // Hide buttons
    nextBtn.style.display = "none";
    submitBtn.style.display = "none";

    // Load question content
    const currentQuestion = quizData[currentQuestionIndex];
    questionEl.innerHTML = `<span class="text-primary-blue font-extrabold mr-2">${currentQuestionIndex + 1}.</span> ${currentQuestion.question}`;
    optionsEl.innerHTML = "";

    currentQuestion.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.innerText = option.trim(); 
        // Tailwind classes for modern, clickable options
        button.classList.add("option", "block", "w-full", "p-4", "border-2", "border-primary-blue/50", "bg-white", "text-gray-800", "font-medium", "cursor-pointer", "rounded-xl", "text-left", "transition", "duration-300", "hover:bg-primary-blue/10", "hover:shadow-md");
        button.onclick = () => {
            checkAnswer(button, index);
        };
        optionsEl.appendChild(button);
    });

    startTimer();
}

function applyFlipAnimation(callback) {
    quizCard.classList.add('card-animate');
    setTimeout(() => {
        if (callback) {
            callback();
        }
    }, 700); // Duration matches the CSS animation time
}

function checkAnswer(button, selectedIndex) {
    clearInterval(timer);
    
    const correctIndex = quizData[currentQuestionIndex].answer;
    const options = document.querySelectorAll(".option");

    options.forEach(btn => {
        btn.disabled = true;
        btn.classList.remove("hover:bg-primary-blue/10", "hover:shadow-md");
        btn.classList.add("opacity-75");
    });

    // Display correct/wrong result
    if (selectedIndex === correctIndex) {
        button.classList.remove("bg-white", "opacity-75");
        button.classList.add("bg-accent-green", "text-white", "shadow-xl", "opacity-100");
        score++;
    } else {
        button.classList.remove("bg-white", "opacity-75");
        button.classList.add("bg-accent-red", "text-white", "shadow-xl", "opacity-100");
        
        // Highlight correct answer in green
        options[correctIndex].classList.remove("bg-white", "opacity-75");
        options[correctIndex].classList.add("bg-accent-green", "text-white", "shadow-xl", "opacity-100");
    }

    // Show next button
    if (currentQuestionIndex < quizData.length - 1) {
        document.querySelector(".next-btn").style.display = "inline-block";
    } else {
        document.querySelector(".submit-btn").style.display = "inline-block";
    }
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) {
        loadQuestion();
    } else {
        submitQuiz(); 
    }
}

function submitQuiz() {
    clearInterval(timer);
    const quizContent = document.querySelector(".quiz-content");
    const totalQuestions = quizData.length;
    
    // Update HTML to show results with Tailwind styling
    document.querySelector(".quiz-container").innerHTML = `
        <div class="result-box text-center p-6 sm:p-8">
            <h2 class="text-4xl font-extrabold text-primary-blue mb-4">🎉 Quiz Completed!</h2>
            <hr class="border-t-2 border-primary-blue/30 my-4"> 
            <p class="text-2xl font-bold text-gray-800 mb-6">Your Score: <span class="text-accent-green text-3xl">${score}</span> / ${totalQuestions}</p>
            <button class="px-6 py-3 bg-primary-blue text-white font-bold rounded-full shadow-lg transition duration-200 hover:bg-primary-blue/90 active:scale-95 focus:outline-none focus:ring-4 focus:ring-primary-blue/50" onclick="restartQuiz()">🔄 Restart Quiz</button>
        </div>
    `;
    // Hide timer elements
    document.querySelector('.timer').style.display = 'none';
    document.querySelector('.timer-bar').style.display = 'none';
}

function restartQuiz() {
    currentQuestionIndex = 0;
    score = 0;
    
    // Reset the quiz container content and structure using modern styling
    document.querySelector(".quiz-container").innerHTML = `
        <div class="quiz-heading flex items-center justify-center mb-6 border-b pb-4 border-primary-blue/30">
            <div class="heading-icon w-14 h-14 mr-4 flex-shrink-0">
               <img src="https://placehold.co/60x60/1D4ED8/FFFFFF?text=Math" alt="Quiz Icon" class="rounded-full shadow-md"> 
            </div>
            <span class="quiz-text text-3xl font-extrabold text-primary-blue">Maths Quiz</span>
        </div>

        <div class="timer-bar mb-4 bg-gray-200 rounded-full h-3">
            <div id="timer-progress" class="timer-progress h-3 rounded-full bg-accent-red" style="width: 100%;"></div>
        </div>
        <div class="timer text-xl font-bold mb-6 text-accent-red">Time Left: <span id="timer-text">30</span>s</div>
        
        <div class="quiz-content">
            <h2 id="question" class="text-xl sm:text-2xl font-semibold text-gray-800 mb-6 text-left"></h2>
            <div class="options space-y-3" id="options"></div>
            <div class="mt-8 flex justify-center space-x-4 border-t pt-4 border-gray-200">
                <button class="next-btn hidden px-6 py-3 bg-primary-blue text-white font-bold rounded-full shadow-lg transition duration-200 hover:bg-primary-blue/90 active:scale-95 focus:outline-none focus:ring-4 focus:ring-primary-blue/50" onclick="applyFlipAnimation(nextQuestion)">Next</button>
                <button class="submit-btn hidden px-6 py-3 bg-primary-blue text-white font-bold rounded-full shadow-lg transition duration-200 hover:bg-primary-blue/90 active:scale-95 focus:outline-none focus:ring-4 focus:ring-primary-blue/50" onclick="submitQuiz()">Submit</button>
            </div>
        </div>
    `;
    
    // Load the first question with animation
    applyFlipAnimation(loadQuestion);
}

document.addEventListener("DOMContentLoaded", loadQuestion);

</script>
</body>
</html>
