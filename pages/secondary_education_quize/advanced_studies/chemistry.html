<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Standard Chemistry Formula Quiz</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for smooth transitions */
        .option-btn {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        /* The timer bar transition for smooth visual countdown */
        #timer-bar {
            transition: width 1s linear, background-color 0.5s ease;
        }
        
        /* Pulse animation for timer text when time is low */
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        .timer-low-animation {
            animation: pulse-red 0.5s infinite alternate ease-in-out;
            color: #ef4444; /* Force red text color when pulsing */
            display: inline-block; /* Required for transform to work */
        }
        
        /* Exit Button Style */
        .exit-btn {
            background-color: #ef4444; /* Red color */
            border: 2px solid white;
            outline: 2px solid #ef4444;
            transition: all 0.3s;
        }
        .exit-btn:hover {
            background-color: #b91c1c; /* Dark Red */
            transform: scale(1.05);
        }

        /* Responsive quiz container width */
        .quiz-container {
            width: 95%;
            max-width: 700px;
            /* Added transition for hover effect */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* New Hover Effect for the Quiz Card */
        .quiz-container:hover {
            transform: translateY(-5px) scale(1.01); /* Lift up slightly */
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.7), 0 8px 8px rgba(0, 0, 0, 0.1); /* Add vibrant shadow */
            border: 4px solid #4f46e5; /* Primary accent border on hover */
        }
    </style>
    <script>
        // Tailwind configuration for custom colors
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Custom colors matching the provided gradient theme
                        'bg-start': '#667eea', /* Provided Blue */
                        'bg-end': '#764ba2', /* Provided Purple */
                        'primary-accent': '#f97316', /* Orange 600 - Options button color */
                        'secondary-accent': '#ffeb3b', /* Yellow 400 - Timer color */
                        'card-bg': 'rgba(255, 255, 255, 0.9)', /* Light White for card */
                        'text-color': '#1f2937', /* Dark Gray - Main Text Color */
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col items-center p-4" 
      style="background: linear-gradient(135deg, var(--tw-bg-start), var(--tw-bg-end));">

    <!-- Exit Button -->
    <a href="./../secondary_education.html"
       class="exit-btn absolute top-5 left-5 h-10 w-20 text-lg font-semibold text-white rounded-xl cursor-pointer 
              flex items-center justify-center shadow-lg">
        Exit
    </a>

    <!-- Quiz Container - Moved up slightly and styled attractively -->
    <div class="quiz-container mx-auto mt-12 bg-card-bg backdrop-blur-sm p-6 sm:p-10 rounded-2xl shadow-2xl text-text-color border-4 border-white/50">
        <h2 class="text-3xl font-extrabold mb-8 drop-shadow-lg text-primary-accent text-center">12th Standard Chemistry Formula Quiz</h2>
        
        <div id="quiz" class="space-y-6">
            
            <!-- Timer Display with Animated Bar -->
            <div class="mb-6">
                <p id="timer" class="text-xl font-bold mb-2 text-primary-accent drop-shadow-md">
                    Time Left: <span id="timer-text" class="text-secondary-accent">30s</span>
                </p>
                <div class="w-full bg-gray-300 rounded-full h-2.5 overflow-hidden">
                    <div id="timer-bar" class="h-full bg-primary-accent rounded-full" style="width: 100%;"></div>
                </div>
            </div>

            <!-- Question Text -->
            <p class="question text-2xl font-semibold mb-6 text-text-color text-left" id="question-text"></p>
            
            <!-- Options Container -->
            <div class="options space-y-3" id="options">
                <!-- Options will be dynamically inserted here -->
            </div>
            
            <!-- Result Feedback -->
            <p id="result" class="text-xl font-bold pt-4 min-h-[3rem] text-center"></p>
            
            <!-- Next Button -->
            <button onclick="nextQuestion()" style="display:none;" id="next-btn"
                    class="mt-4 px-6 py-3 bg-gray-800 text-white font-bold rounded-lg shadow-xl 
                           hover:bg-black transition duration-300 w-full sm:w-1/3 mx-auto block">
                Next Question
            </button>
        </div>
    </div>

    <script>
        const questions = [
            { question: "What is the molecular formula of water?", options: ["H₂O", "CO₂", "O₂", "NaCl"], correct: "H₂O" },
            { question: "What is the formula for sulfuric acid?", options: ["H₂SO₄", "HCl", "HNO₃", "NaOH"], correct: "H₂SO₄" },
            { question: "What is the ideal gas equation?", options: ["PV = nRT", "E = mc²", "F = ma", "P = IV"], correct: "PV = nRT" },
            { question: "What is the chemical formula for sodium chloride?", options: ["NaCl", "KCl", "CaCl₂", "MgO"], correct: "NaCl" },
            { question: "What is the pH formula?", options: ["pH = -log[H⁺]", "pH = log[OH⁻]", "pH = H₂O", "pH = P/V"], correct: "pH = -log[H⁺]" }
        ];
        
        let currentQuestionIndex = 0;
        const initialTime = 30;
        let timeLeft = initialTime;
        let timer;
        const correctColor = 'bg-green-600';
        const wrongColor = 'bg-red-600';
        const defaultColor = 'bg-primary-accent';

        /**
         * Starts or restarts the 30-second countdown timer and the animated bar.
         */
        function startTimer() {
            timeLeft = initialTime;
            const timerText = document.getElementById("timer-text");
            const timerBar = document.getElementById("timer-bar");

            clearInterval(timer);
            
            // Reset bar appearance, width, and remove animation
            timerText.innerText = `${timeLeft}s`;
            timerBar.classList.remove(wrongColor, 'bg-yellow-500');
            timerBar.classList.add(defaultColor);
            timerBar.style.width = '100%';
            timerText.classList.remove('timer-low-animation');
            timerText.classList.remove('text-red-500'); // Ensure it starts with default color

            timer = setInterval(() => {
                timeLeft--;
                timerText.innerText = `${timeLeft}s`;
                
                const percent = (timeLeft / initialTime) * 100;
                timerBar.style.width = `${percent}%`;

                // Add pulsing animation when time is low (<= 10 seconds)
                if (timeLeft <= 10) {
                    timerText.classList.add('timer-low-animation', 'text-red-500');
                } else {
                    timerText.classList.remove('timer-low-animation', 'text-red-500');
                }

                // Change color warning on the bar
                timerBar.classList.remove(defaultColor, 'bg-yellow-500', wrongColor);
                if (timeLeft <= 10 && timeLeft > 5) {
                    timerBar.classList.add('bg-yellow-500'); // Yellow color
                } else if (timeLeft <= 5) {
                    timerBar.classList.add(wrongColor); // Red color
                } else {
                    timerBar.classList.add(defaultColor);
                }

                if (timeLeft === 0) {
                    clearInterval(timer);
                    checkAnswer(null); // Time's up
                }
            }, 1000);
        }

        /**
         * Loads the current question and its options.
         */
        function loadQuestion() {
            startTimer();
            let q = questions[currentQuestionIndex];
            
            document.getElementById("question-text").innerHTML = q.question;
            let optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            
            q.options.forEach(option => {
                let btn = document.createElement("button");
                btn.innerHTML = option;
                // Tailwind styles for options
                btn.className = 'option-btn w-full py-3 px-4 font-medium text-lg rounded-xl shadow-lg ' +
                                'bg-primary-accent text-white hover:bg-orange-700 focus:outline-none focus:ring-4 focus:ring-orange-300';
                btn.onclick = (e) => checkAnswer(option, e.target);
                optionsDiv.appendChild(btn);
            });
        }

        /**
         * Checks the user's selected answer against the correct answer.
         */
        function checkAnswer(selected, selectedButton) {
            clearInterval(timer);
            document.getElementById("timer-text").classList.remove('timer-low-animation', 'text-red-500'); 

            let resultText = document.getElementById("result");
            let nextBtn = document.getElementById("next-btn");
            let isCorrect = selected === questions[currentQuestionIndex].correct;
            let correctOption = questions[currentQuestionIndex].correct;
            
            // Disable all buttons to prevent multiple clicks
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.disabled = true;
                btn.classList.remove('hover:bg-orange-700');
                
                // Highlight correct answer
                if (btn.innerHTML === correctOption) {
                    btn.classList.remove('bg-primary-accent');
                    btn.classList.add(correctColor, 'ring-4', 'ring-green-300');
                }
                
                // Highlight selected wrong answer
                if (selectedButton && btn === selectedButton && !isCorrect) {
                    btn.classList.remove('bg-primary-accent');
                    btn.classList.add(wrongColor, 'ring-4', 'ring-red-300');
                }
            });

            if (isCorrect) {
                resultText.innerHTML = "Correct! ✅ You got the formula right!";
                resultText.classList.remove('text-red-600');
                resultText.classList.add('text-green-600');
            } else if (selected === null) {
                resultText.innerHTML = `Time's up! ⏰ The correct formula was: <span class="font-extrabold">${correctOption}</span>`;
                resultText.classList.remove('text-green-600');
                resultText.classList.add('text-red-600');
            } else {
                resultText.innerHTML = `Wrong! ❌ The correct formula was: <span class="font-extrabold">${correctOption}</span>`;
                resultText.classList.remove('text-green-600');
                resultText.classList.add('text-red-600');
            }
            
            nextBtn.style.display = "block";
        }

        /**
         * Advances to the next question or finishes the quiz.
         */
        function nextQuestion() {
            currentQuestionIndex++;
            let resultText = document.getElementById("result");
            let nextBtn = document.getElementById("next-btn");
            
            if (currentQuestionIndex < questions.length) {
                resultText.innerHTML = "";
                nextBtn.style.display = "none";
                loadQuestion();
            } else {
                // Quiz completion message
                document.getElementById("quiz").innerHTML = `
                    <h3 class="text-4xl font-extrabold text-primary-accent">Quiz Complete! 🎉</h3>
                    <p class="text-2xl mt-4 text-text-color">Congratulations on completing the 12th Standard Chemistry Formula Quiz!</p>
                    <a href="./../secondary_education.html" 
                       class="inline-block mt-8 px-6 py-3 bg-gray-800 text-white font-bold rounded-lg shadow-xl 
                              hover:bg-black transition duration-300">
                       Go back to Advanced Studies
                    </a>
                `;
            }
        }

        // Initialize the first question on load
        loadQuestion();
    </script>
</body>
</html>
