<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Standard Formula Quiz</title>
    <!-- Importing Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #5d06b8; /* Deep Violet */
            --secondary-color: #ff9800; /* Orange Accent */
            --background-start: #667eea;
            --background-end: #764ba2;
            --text-color: #ffffff;
            --container-bg: rgba(255, 255, 255, 0.1); /* Slightly more transparent */
            --shadow-light: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-deep: 0 15px 30px rgba(0, 0, 0, 0.4); /* Deeper shadow for realism */
        }

        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, var(--background-start), var(--background-end));
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Exit Button Styling --- */
        .exit {
            background-color: #e53e3e; 
            border: 2px solid var(--text-color);
            height: 40px;
            width: 80px;
            font-size: 16px;
            font-weight: 600;
            position: absolute;
            left: 20px;
            top: 20px;
            color: var(--text-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-deep);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .exit:hover {
            background-color: #c53030;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
        }

        /* --- Quiz Container Styling --- */
        .quiz-container {
            width: 90%;
            max-width: 550px; /* Slightly wider container */
            margin: 20px auto;
            background: var(--container-bg);
            backdrop-filter: blur(12px); /* Stronger frosted glass effect */
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px 30px; /* More padding */
            border-radius: 18px;
            box-shadow: var(--shadow-deep);
        }
        
        h2 {
            font-weight: 700;
            margin-bottom: 25px;
            font-size: 2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .question {
            font-size: 1.35rem;
            margin-bottom: 25px;
            font-weight: 600;
            line-height: 1.6;
            padding: 15px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
        }

        /* --- Options Button Styling --- */
        .options button {
            display: block;
            width: 100%;
            margin: 12px 0;
            padding: 16px;
            font-size: 1.15rem;
            border: none;
            cursor: pointer;
            background: var(--secondary-color);
            color: var(--text-color);
            border-radius: 10px;
            transition: all 0.2s ease-in-out;
            font-weight: 600;
            box-shadow: 0 4px 0 #cc7a00; /* 3D effect */
        }

        .options button:active {
            box-shadow: 0 1px 0 #cc7a00;
            transform: translateY(3px);
        }

        .options button:hover:not(.disabled button) {
            background: #e68900;
            transform: scale(1.01);
        }

        /* --- Timer Bar Styling (New Animated Feature) --- */
        #timer-container {
            margin-bottom: 30px;
            padding: 10px 0;
        }
        #timer-text {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffeb3b; /* Yellow for visibility */
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        #time-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 1px 5px rgba(0, 0, 0, 0.5); /* Inner shadow for depth */
        }
        #time-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4caf50, #ffeb3b);
            transition: width 1s linear, background 0.5s ease-in-out; /* Smooth transition */
            border-radius: 6px;
            transform-origin: left;
        }
        
        #result {
            font-size: 1.4rem;
            margin-top: 25px;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }
        
        /* --- Next Button Styling --- */
        #next-btn, #restart-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s, transform 0.3s;
            display: block;
            width: 180px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 5px 0 #3b0472; /* 3D effect */
        }
        
        #next-btn:active, #restart-btn:active {
            box-shadow: 0 1px 0 #3b0472;
            transform: translateY(4px);
        }
        
        #next-btn:hover, #restart-btn:hover {
            background: #47048f;
        }

        /* Correct/Wrong Feedback Colors */
        .correct {
            background: #4caf50 !important; /* Green */
            box-shadow: 0 0 20px rgba(76, 175, 80, 1);
        }

        .wrong {
            background: #f44336 !important; /* Red */
            box-shadow: 0 0 20px rgba(244, 67, 54, 1);
        }
    </style>
</head>
<body>
    
    <a href="./../secondary_education.html" class="exit">Exit</a>

    <div class="quiz-container">
        <h2>12th Board Formula Quiz</h2>
        <div id="quiz">
            <div id="timer-container">
                <p id="timer-text">Time Left: 30s</p>
                <div id="time-bar-bg"><div id="time-bar"></div></div>
            </div>
            
            <p class="question" id="question-text"></p>
            <div class="options" id="options"></div>
            <p id="result"></p>
            <button onclick="nextQuestion()" id="next-btn">Next Question</button>
        </div>
    </div>

    <script>
        // Helper function to render LaTeX-style math for clean display
        function formatMath(text) {
            // Replaces $...$ with <span> for italic math font display
            return text.replace(/\$(.*?)\$/g, (match, p1) => `<span style="font-family: Georgia, serif; font-style: italic;">${p1}</span>`);
        }

        const questions = [
            { question: "What is the formula for the Area of a circle?", options: ["$2\\pi r$", "$\\pi r^2$", "$2r$", "$r^2$"], correct: "$\\pi r^2$" },
            { question: "What is Newton's Second Law of Motion?", options: ["$E = mc^2$", "$F = ma$", "$v = u + at$", "$P = IV$"], correct: "$F = ma$" },
            { question: "What is the Derivative of $\\sin(x)$?", options: ["$-\\cos(x)$", "$\\cos(x)$", "$\\tan(x)$", "$x^2$"], correct: "$\\cos(x)$" },
            { question: "What is the formula for Kinetic Energy?", options: ["$KE = \\frac{1}{2} mv^2$", "$PE = mgh$", "$W = Fx$", "$F = ma$"], correct: "$KE = \\frac{1}{2} mv^2$" },
            { question: "What is Ohm's Law?", options: ["$P = IV$", "$F = ma$", "$V = IR$", "$E = mc^2$"], correct: "$V = IR$" }
        ];
        
        const MAX_TIME = 30;
        let currentQuestionIndex = 0;
        let timeLeft = MAX_TIME;
        let timer;
        let score = 0;

        function startTimer() {
            timeLeft = MAX_TIME;
            document.getElementById("timer-text").innerText = `Time Left: ${timeLeft}s`;
            
            const timeBar = document.getElementById("time-bar");
            
            // 1. Reset the bar state to 100% instantly
            timeBar.style.transition = 'none'; 
            timeBar.style.width = '100%';
            timeBar.style.background = 'linear-gradient(90deg, #4caf50, #ffeb3b)';

            // 2. Re-enable transition after a very short delay (trick to reset CSS transition)
            setTimeout(() => {
                timeBar.style.transition = 'width 1s linear, background 0.5s ease-in-out';
            }, 10);

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer-text").innerText = `Time Left: ${timeLeft}s`;

                const percentage = (timeLeft / MAX_TIME) * 100;
                timeBar.style.width = `${percentage}%`;

                // Dynamic color change logic for realistic effect
                if (timeLeft <= 10) {
                    timeBar.style.background = '#f44336'; // Red when time is low
                } else if (timeLeft <= 20) {
                    timeBar.style.background = 'linear-gradient(90deg, #ff9800, #ffeb3b)'; // Orange/Yellow
                } else {
                    timeBar.style.background = 'linear-gradient(90deg, #4caf50, #ffeb3b)'; // Green/Yellow
                }

                if (timeLeft === 0) {
                    clearInterval(timer);
                    checkAnswer(null); // Time's up
                }
            }, 1000);
        }

        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            clearInterval(timer);
            startTimer();
            
            let q = questions[currentQuestionIndex];
            
            document.getElementById("question-text").innerHTML = formatMath(q.question);
            
            let optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";
            optionsDiv.classList.remove('disabled'); 
            document.getElementById("result").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            
            q.options.forEach(option => {
                let btn = document.createElement("button");
                btn.innerHTML = formatMath(option); 
                btn.onclick = () => checkAnswer(option);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(selected) {
            clearInterval(timer);
            
            let resultText = document.getElementById("result");
            let nextBtn = document.getElementById("next-btn");
            let optionsDiv = document.getElementById("options");
            
            optionsDiv.classList.add('disabled'); 

            let isCorrect = false;
            Array.from(optionsDiv.children).forEach(button => {
                const buttonValue = button.textContent.trim();
                // Compare options by removing LaTeX formatting characters for clean match
                const correctValue = questions[currentQuestionIndex].correct.replace(/[\$\\]/g, '').trim();

                if (buttonValue === correctValue) {
                    button.classList.add('correct');
                    button.style.boxShadow = '0 0 20px rgba(76, 175, 80, 0.8)';
                }

                if (selected !== null && buttonValue === selected.replace(/[\$\\]/g, '').trim()) {
                    if (selected === questions[currentQuestionIndex].correct) {
                        isCorrect = true;
                        button.style.boxShadow = '0 0 25px rgba(76, 175, 80, 1)';
                    } else {
                        button.classList.add('wrong');
                        button.style.boxShadow = '0 0 20px rgba(244, 67, 54, 1)';
                    }
                }
                button.onclick = null; // Disable all buttons after selection
                button.style.cursor = 'default';
            });
            
            if (isCorrect) {
                resultText.innerHTML = "Correct! ✅";
                resultText.style.color = "#4caf50";
                score++;
            } else if (selected === null) {
                resultText.innerHTML = `Time's Up! ⏱️. The correct answer is: ${formatMath(questions[currentQuestionIndex].correct)}`;
                resultText.style.color = "#f44336";
            } else {
                resultText.innerHTML = `Wrong! ❌. The correct answer is: ${formatMath(questions[currentQuestionIndex].correct)}`;
                resultText.style.color = "#f44336";
            }
            
            nextBtn.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }
        
        function showResults() {
            document.getElementById("quiz").innerHTML = `
                <h3 style="font-size: 2.2rem; color: #ffeb3b; margin-bottom: 30px;">Quiz Completed! 🎉</h3>
                <p style="font-size: 1.6rem;">Your Final Score:</p>
                <p style="font-size: 3rem; font-weight: 800; color: #4caf50;">${score} / ${questions.length}</p>
                <p style="font-size: 1.3rem; margin-top: 30px;">Keep rocking those formulas!</p>
                <button onclick="window.location.reload()" id="restart-btn" style="background-color: #4caf50; margin-top: 40px;">Restart Quiz</button>
            `;
        }

        // Initialize quiz
        loadQuestion();
    </script>
</body>
</html>
