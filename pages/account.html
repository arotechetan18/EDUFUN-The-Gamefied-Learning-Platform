<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Account - Simple Purple Animated</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/bf520e6492.js" crossorigin="anonymous"></script>

    <style>
        /* 💜 Simple Purple Theme - Animated */
        :root {
            --primary-purple: #9c27b0; /* Medium Purple for main accents */
            --light-purple: #e1bee7; /* Very light purple background */
            --dark-text: #4a148c; /* Deep purple text */
            --shadow-color: rgba(156, 39, 176, 0.4);
            --bg-body: #f3e5f5; /* Lightest purple body background */
        }

        body {
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
            text-align: center;
            color: var(--dark-text);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: var(--primary-purple);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* 🌟 UPDATED: Card Size and Animation */
        .account-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 450px; /* Increased max-width */
            padding: 50px 30px; /* Increased padding */
            background-color: white;
            border-radius: 20px; /* Softer corners */
            box-shadow: 0 10px 30px var(--shadow-color); /* Deeper shadow */
            border-top: 5px solid var(--primary-purple);
            
            /* Add animation transition */
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        
        /* 🚀 Animation: Lift the card on hover */
        .account-container:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px var(--shadow-color);
        }

        /* Profile Image Container */
        .ac-img {
            width: 170px; /* Increased image size */
            height: 170px;
            background: var(--light-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid var(--primary-purple);
            margin-bottom: 20px; /* Increased margin */
            transition: transform 0.3s;
        }
        
        .ac-img:hover {
            transform: scale(1.08); /* Slightly more aggressive zoom on image */
        }

        .ac-img img {
            height: 100%;
            width: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Username Display */
        #userName {
            font-size: 2rem; /* Increased font size for prominence */
            color: var(--dark-text);
            font-weight: 500;
            margin-top: 10px;
            margin-bottom: 35px; /* Increased margin */
        }

        /* File Upload Styling (Hidden and Custom Button) */
        input[type="file"] {
            display: none;
        }

        /* Custom Label/Button for file input */
        .upload-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-purple);
            color: white;
            padding: 12px 25px; /* Increased button size */
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem; /* Increased font size */
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s, transform 0.2s;
        }

        .upload-label:hover {
            background-color: var(--dark-text);
            transform: translateY(-2px); /* Button lift animation */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .upload-label i {
            font-size: 1.1rem;
        }
        
        /* Media query for smaller screens */
        @media (max-width: 480px) {
            .account-container {
                max-width: 95%;
                padding: 30px 15px;
            }
            .ac-img {
                width: 130px;
                height: 130px;
            }
            #userName {
                font-size: 1.8rem;
            }
            .upload-label {
                font-size: 0.9rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <h1>User Profile</h1>
    <div class="account-container">
        <div class="account-info">
            <div class="ac-img">
                <img
                    src="./../images/account-black.png"
                    alt="user profile image"
                    id="userAccountImage"
                />
            </div>
            <h1 id="userName">User Name</h1>
            
            <form id="profileForm">
                <label for="userImage" class="upload-label">
                    <i class="fas fa-camera"></i>
                    Change Photo
                </label>
                
                <input type="file" id="userImage" name="userImage" accept="image/*" />
            </form>
        </div>
    </div>

    <script>
        const primaryImage = document.getElementById("userAccountImage");
        const userImageInput = document.getElementById("userImage");
        const userNameElement = document.getElementById("userName");

        // --- Image Handling ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const dataURL = e.target.result;
                    primaryImage.src = dataURL;
                    localStorage.setItem("profileImage", dataURL);
                };
                reader.readAsDataURL(file);
            }
        }
        userImageInput.addEventListener('change', handleImageUpload);


        // --- Local Storage Loading ---
        
        // 1. Load Image
        const savedImage = localStorage.getItem("profileImage");
        if (savedImage) {
            primaryImage.src = savedImage;
        } else {
             primaryImage.src = "./../images/account-black.png";
        }

        // 2. Load Username
        const savedUsername = localStorage.getItem("loggedInUser");
        if (savedUsername) {
            const formattedUsername = savedUsername.charAt(0).toUpperCase() + savedUsername.slice(1);
            userNameElement.textContent = formattedUsername;
        } else {
            userNameElement.textContent = "Guest User";
        }
    </script>
</body>
</html>
