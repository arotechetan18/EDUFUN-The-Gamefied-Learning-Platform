<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Animal Info</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <style>
        /* --- General Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            /* Purple Shades Gradient Background */
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- EXIT BUTTON --- */
        .exit {
            background-color: #ff3366; /* Red/Pink */
            border: 2px solid #fff;
            height: 45px;
            width: 50px;
            font-size: 0; 
            position: absolute;
            left: 20px;
            top: 20px;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            outline: 2px solid #ff3366;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            animation: bounceIn 1s ease-out; /* Bounce Animation */
            z-index: 10;
        }
        .exit:hover {
            background-color: #cc0052;
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }
        .exit .material-symbols-outlined {
            font-size: 24px;
            color: white;
        }

        /* Bounce Animation Keyframes */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* --- Main Container --- */
        .game-container {
            /* Semi-transparent white with blur effect */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 95%;
            max-width: 700px;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInScale 1.2s ease-out; /* Fade-in Scale Animation */
        }

        /* Fade-in Scale Animation Keyframes */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 38px;
            color: #f7b733; /* Bright Yellow/Orange */
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* --- Input Box --- */
        #animalInput {
            padding: 15px;
            font-size: 20px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            border: 3px solid #f7b733;
            border-radius: 12px;
            margin-bottom: 20px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.1);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        #animalInput:focus {
            outline: none;
            border-color: #ff3366; /* Red on focus */
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.5);
        }

        /* --- Button --- */
        .button {
            padding: 15px 30px;
            margin-top: 10px;
            border: none;
            background-color: #f7b733;
            color: #333;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        .button:hover {
            background-color: #e67e22; /* Darker orange */
            color: white;
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }
        .button:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);
        }

        /* --- Info Display --- */
        .info {
            margin-top: 30px;
            font-size: 20px;
            line-height: 1.6;
            text-align: left;
            padding: 0 20px;
            opacity: 0; /* Hidden initially */
            animation: fadeIn 0.8s ease-out forwards; /* Fade-in Animation */
            max-width: 100%;
        }
        .info strong {
            color: #f7b733;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- Image Display --- */
        .animal-img {
            margin-top: 30px;
            width: 100%;
            max-width: 450px;
            height: auto;
            object-fit: cover;
            display: none; /* Hidden initially */
            border-radius: 20px;
            border: 5px solid #f7b733;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            opacity: 0; /* Hidden initially */
            animation: fadeInScaleImage 1s ease-out forwards; /* Fade-in Scale Animation */
        }
        @keyframes fadeInScaleImage {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- Responsive Design --- */
        @media screen and (max-width: 768px) {
            h1 { font-size: 32px; margin-bottom: 25px; }
            .info { font-size: 18px; }
            .animal-img { max-width: 350px; }
        }
        @media screen and (max-width: 480px) {
            body { padding: 10px; }
            .game-container { padding: 25px 15px; border-radius: 15px; }
            h1 { font-size: 26px; margin-top: 0; margin-bottom: 20px; }
            #animalInput { font-size: 16px; padding: 10px; width: 90%; }
            .button { font-size: 18px; padding: 10px 20px; }
            .info { font-size: 16px; padding: 0 10px; }
            .animal-img { max-width: 280px; border-width: 4px; border-radius: 15px; }
            .exit { height: 35px; width: 38px; left: 10px; top: 10px; }
            .exit .material-symbols-outlined { font-size: 20px; }
        }
    </style>
</head>
<body>
    <a href="./../.././primary-education/kindergarten/kindergarden.html">
        <button class="exit" onclick="return confirmExit()">
            <span class="material-symbols-outlined"> logout </span>
        </button>
    </a>

    <div class="game-container">
        <h1>🐾 Jungle Animal Info 🌿</h1>
        <input type="text" id="animalInput" placeholder="Enter animal name (e.g., tiger)">
        <button class="button" onclick="getAnimalInfo()">Get Info</button>
        <div class="info" id="animalInfo">
            Type an animal name to learn amazing facts about your favorite jungle creatures!
        </div>
        <img id="animalImage" class="animal-img" src="" alt="Animal Image">
    </div>

    <script>
        const animals = {
            "tiger": { 
                info: "Tigers are the largest wild cats in the world. They are solitary and nocturnal hunters.", 
                habitat: "Forests, grasslands, and mangrove swamps.",
                diet: "Carnivorous - mainly deer, wild boars, and buffalo.",
                lifespan: "10-15 years in the wild, up to 25 years in captivity.",
                image: "./../../../images/wildtiger.jpg" 
            },
            "elephant": { 
                info: "Elephants have an incredible memory and are known for their strong social bonds and large size.", 
                habitat: "Grasslands, forests, and savannas across Asia and Africa.",
                diet: "Herbivorous - grasses, fruits, and bark.",
                lifespan: "50-70 years.",
                image: "./../../../images/wildelephant.jpg" 
            },
            "monkey": { 
                info: "Monkeys are known for their high intelligence and playfulness. They often live in trees and are highly social.", 
                habitat: "Tropical forests, grasslands, and mountains.",
                diet: "Omnivorous - fruits, nuts, insects, and small animals.",
                lifespan: "10-50 years depending on the species.",
                image: "./../../../images/monkey.jpg" 
            },
            "lion": { 
                info: "Lions are often called the 'king of the jungle' and are the only cats that live in social groups called prides.", 
                habitat: "Savannas, grasslands, and open woodlands.",
                diet: "Carnivorous - primarily large herbivores like zebras and antelopes.",
                lifespan: "10-14 years in the wild, up to 20 years in captivity.",
                image: "./../../../images/wildlion.jpg" 
            },
            "giraffe": { 
                info: "Giraffes are the tallest land animals, famous for their long necks, which help them reach high leaves.", 
                habitat: "Savannas and open woodlands.",
                diet: "Herbivorous - mainly leaves from acacia trees.",
                lifespan: "20-25 years.",
                image: "./../../../images/giraffe.jpg" 
            },
            "zebra": { 
                info: "Zebras are recognized by their unique black and white stripes, which act as a form of camouflage against predators.", 
                habitat: "Grasslands and savannas.",
                diet: "Herbivorous - grass and shrubs.",
                lifespan: "20-25 years.",
                image: "./../../../images/wildzebra.jpg" 
            },
            "cheetah": { 
                info: "Cheetahs are the fastest land animals, capable of reaching speeds of up to 70 mph for short bursts.", 
                habitat: "Grasslands and savannas.",
                diet: "Carnivorous - mainly gazelles and small antelopes.",
                lifespan: "10-12 years in the wild, up to 17 years in captivity.",
                image: "./../../../images/cheetah.jpg" 
            },
            "panda": { 
                info: "Pandas are native to China and primarily eat bamboo. They are a beloved symbol of wildlife conservation.", 
                habitat: "Mountainous bamboo forests in China.",
                diet: "Herbivorous - primarily bamboo, but also fruits and small animals occasionally.",
                lifespan: "20 years in the wild, up to 30 years in captivity.",
                image: "./../../../images/panda.jpg" 
            },
            "wolf": { 
                info: "Wolves are highly intelligent predators that live and hunt in packs, maintaining a strong social structure.", 
                habitat: "Forests, tundras, grasslands, and mountains.",
                diet: "Carnivorous - deer, elk, and small mammals.",
                lifespan: "6-8 years in the wild, up to 15 years in captivity.",
                image: "./../../../images/wolf.webp" 
            },
            "bear": { 
                info: "Bears are powerful omnivores that typically hibernate during the winter months to conserve energy.", 
                habitat: "Forests, mountains, and tundras.",
                diet: "Omnivorous - fish, berries, honey, and small animals.",
                lifespan: "20-30 years.",
                image: "./../../../images/bear.jpg" 
            },
            "kangaroo": { 
                info: "Kangaroos use their strong hind legs and large feet to hop and cover long distances. Females carry their young in a pouch.", 
                habitat: "Grasslands and open woodlands in Australia.",
                diet: "Herbivorous - grass and leaves.",
                lifespan: "6-8 years in the wild, up to 20 years in captivity.",
                image: "./../../../images/kangaroo.webp" 
            },
        };

        const animalInfoDiv = document.getElementById("animalInfo");
        const animalImage = document.getElementById("animalImage");

        function getAnimalInfo() {
            let animalName = document.getElementById("animalInput").value.toLowerCase();
            let animal = animals[animalName];
            
            // Remove existing animations to re-trigger
            animalInfoDiv.style.animation = 'none';
            animalImage.style.animation = 'none';
            // Force reflow to allow animation restart
            animalInfoDiv.offsetHeight;
            animalImage.offsetHeight;

            if (animal) {
                animalInfoDiv.innerHTML = `
                    <strong>Fact:</strong> ${animal.info} <br>
                    <strong>Habitat:</strong> ${animal.habitat} <br>
                    <strong>Diet:</strong> ${animal.diet} <br>
                    <strong>Lifespan:</strong> ${animal.lifespan} <br>
                `;
                animalInfoDiv.style.opacity = 0; // Reset for Fade-in
                animalInfoDiv.style.animation = 'fadeIn 0.8s ease-out forwards';

                animalImage.src = animal.image;
                animalImage.style.display = "block";
                animalImage.style.opacity = 0; // Reset for Fade-in
                animalImage.style.animation = 'fadeInScaleImage 1s ease-out forwards';
            } else {
                animalInfoDiv.innerText = "Sorry, information not available for this animal. Please try another name.";
                animalInfoDiv.style.opacity = 0; // Reset for Fade-in
                animalInfoDiv.style.animation = 'fadeIn 0.8s ease-out forwards';
                animalImage.style.display = "none";
            }
        }

        // Exit confirmation function
        function confirmExit() {
            let exitConfirm = confirm("Are you sure you want to exit?");
            return exitConfirm; // Return true to allow navigation, false to cancel
        }

        // Initial welcome message (ensures the welcome message is styled correctly on load)
        document.addEventListener('DOMContentLoaded', () => {
            animalInfoDiv.style.opacity = 1;
        });
    </script>
</body>
</html>
