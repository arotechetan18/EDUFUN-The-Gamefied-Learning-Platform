<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Report - Purple Theme</title>
    <script src="https://kit.fontawesome.com/a1946cd52a.js" crossorigin="anonymous"></script>
    
    <style>
        /* 💜 Simple Purple Contact Report Theme */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-purple: #6a11cb;    /* Main Deep Purple */
            --light-purple: #b491f9;     /* Accent Lavender Purple */
            --text-dark: #3d0066;        /* Dark Purple Text */
            --bg-light: #f0e6ff;         /* Lightest Lavender Background */
            --card-bg: #ffffff;
            --shadow-color: rgba(106, 17, 203, 0.2);
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            text-align: center;
            border-top: 5px solid var(--primary-purple);
        }

        .main-head {
            color: var(--primary-purple);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .thanks-img {
            width: 150px;
            height: auto;
            margin: 15px auto;
            display: block;
        }

        .main-message {
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 30px;
        }

        .msg-rep {
            background-color: var(--light-purple);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .msg-rep h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .social-head {
            font-size: 1.3rem;
            color: var(--primary-purple);
            margin-bottom: 20px;
        }

        .font-awesome {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-icons a {
            text-decoration: none;
            display: block;
            transition: transform 0.3s ease-out;
        }

        .social-icons i {
            /* Base style for icons */
            font-size: 1.8rem;
            width: 50px;
            height: 50px;
            line-height: 50px;
            border-radius: 50%;
            background-color: var(--light-purple);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
            
            /* Use the CSS variable from the HTML inline style for icon color */
            color: var(--accent-color); 
        }

        /* 🚀 Animation and Color Change on Hover */
        .social-icons i:hover {
            transform: scale(1.15) translateY(-5px);
            /* Box-shadow matches the icon's color */
            box-shadow: 0 8px 20px var(--accent-color, var(--primary-purple), 0.5);
            /* Fill the background with the accent color and change icon symbol to white */
            background-color: var(--accent-color);
            color: white;
        }

        /* Media Query for smaller screens */
        @media (max-width: 450px) {
            .container {
                padding: 30px 15px;
            }
            .main-head {
                font-size: 1.8rem;
            }
            .social-icons i {
                font-size: 1.5rem;
                width: 45px;
                height: 45px;
                line-height: 45px;
            }
        }
    </style>
    <script>
      (function () {
        const marker = "/pages/";
        const path = window.location.pathname;
        const root = path.includes(marker) ? path.split(marker)[0] + "/" : path.substring(0, path.lastIndexOf("/") + 1);
        const script = document.createElement("script");
        script.src = root + "js/site-navigation.js";
        script.defer = true;
        document.head.appendChild(script);
      })();
    </script>
</head>
<body>
    <div class="container">
        <h1 class="main-head">Thanks For Contacting Us!</h1>
        <img src="./../images/thanks.png" class="thanks-img" alt="Thank You illustration">
        <h5 class="main-message">We have received your message and will get back to you within 24 hours.</h5>
        
        <div class="msg-rep">
            <h3>Here's the message report:</h3>
            </div>
        
        <h3 class="social-head">Stay Connected With Us</h3>
        <div class="font-awesome">

            <div class="social-icons">
                <a href="https://www.instagram.com/anshumxnn_27/">
                    <i class="fa-brands fa-instagram" style="--accent-color:#E1306C ;"></i>
                </a>
            </div>
            <div class="social-icons">
                <a href="">
                    <i class="fa-brands fa-facebook" style="--accent-color:#4267B2" ;></i>
                </a>
            </div>
            <div class="social-icons">
                <a href="">
                    <i class="fa-brands fa-x-twitter" style="--accent-color:black"></i>
                </a>
            </div>
            <div class="social-icons">
                <a href="">
                    <i class="fa-brands fa-whatsapp" style="--accent-color:#25D366"></i>
                </a>
            </div>
            <div class="social-icons">
                <a href="">
                    <i class="fa-brands fa-youtube" style="--accent-color:#FF0000"></i>
                </a>
            </div>
        </div>
    </div>
    </body>
</html>
